services:
  # ── MySQL 8.0 ──────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: vc_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_secure_pass_2026}
      MYSQL_DATABASE: ${DB_NAME:-village_connecte}
      MYSQL_USER: ${DB_USER:-vc_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-vc_secure_pass_2026}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    networks:
      - vc_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-root_secure_pass_2026}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
      --max_connections=200
      --innodb_buffer_pool_size=256M

  # ── Node.js API ────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vc_api
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3001
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-village_connecte}
      DB_USER: ${DB_USER:-vc_user}
      DB_PASSWORD: ${DB_PASSWORD:-vc_secure_pass_2026}
      JWT_SECRET: ${JWT_SECRET:-vc_jwt_super_secret_dioradougou_2026}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-24h}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:3002}
      METRICS_INGEST_TOKEN: ${METRICS_INGEST_TOKEN:-}
    ports:
      - "3001:3001"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - vc_network
    volumes:
      - ./src:/app/src:ro
      - ./scripts:/app/scripts:ro
    command: >
      sh -c "node scripts/seed.js && node src/server.js"

  # ── phpMyAdmin (interface DB) ──────────────────────
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: vc_phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: ${DB_ROOT_PASSWORD:-root_secure_pass_2026}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_secure_pass_2026}
    ports:
      - "8080:80"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - vc_network

volumes:
  mysql_data:
    driver: local

networks:
  vc_network:
    driver: bridge
