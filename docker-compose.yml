services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: village
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d village"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgres://user:password@db:5432/village
      PORT: 5000
      JWT_SECRET: change-this-secret-in-production
      JWT_EXPIRES_HOURS: 8
      CORS_ORIGIN: http://localhost:3000,http://localhost:3001
      DB_CONNECT_RETRIES: 30
      DB_CONNECT_RETRY_DELAY_MS: 2500
    depends_on:
      db:
        condition: service_healthy

volumes:
  db-data:
