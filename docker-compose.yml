services:
  db:
    image: mysql:8.0
    container_name: villageconnecte-db
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/scripts/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    networks:
      - village-internal
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: villageconnecte-phpmyadmin
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "127.0.0.1:8081:80"
    networks:
      - village-internal

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: villageconnecte-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: ${PORT}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_HOURS: ${JWT_EXPIRES_HOURS}
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      NODE_ENV: ${NODE_ENV}
      CORS_ORIGINS: ${CORS_ORIGINS}
      ADMIN_PATH: /admin-frontend
      PORTAIL_PATH: /portail-frontend
    volumes:
      - ./backend:/app
      - ./admin/build:/admin-frontend:ro
      - ./portail-captif/build:/portail-frontend:ro
      - /app/node_modules
    networks:
      - village-internal
      - traefik-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.villageconnecte.rule=Host(`villageconnecte.voisilab.online`)"
      - "traefik.http.routers.villageconnecte.entrypoints=websecure"
      - "traefik.http.routers.villageconnecte.tls.certresolver=letsencrypt"
      - "traefik.http.services.villageconnecte.loadbalancer.server.port=3001"
      - "traefik.http.routers.villageconnecte.middlewares=villageconnecte-headers"
      - "traefik.http.middlewares.villageconnecte-headers.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.villageconnecte-headers.headers.stsIncludeSubdomains=true"
      - "traefik.http.middlewares.villageconnecte-headers.headers.forceSTSHeader=true"

volumes:
  mysql_data:

networks:
  village-internal:
    driver: bridge
  traefik-network:
    external: true
